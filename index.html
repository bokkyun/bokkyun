<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추천</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <!-- update the version number as needed -->
    <script defer src="/__/firebase/12.10.0/firebase-app-compat.js"></script>
    <script defer src="/__/firebase/init.js?useEmulator=true"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>로또 번호 추천</h1>
            <p>행운의 숫자를 확인해보세요!</p>
        </header>
        <div class="lotto-numbers">
            <span class="lotto-number"></span>
            <span class="lotto-number"></span>
            <span class="lotto-number"></span>
            <span class="lotto-number"></span>
            <span class="lotto-number"></span>
            <span class="lotto-number"></span>
        </div>
        <button id="generate-btn">번호 생성</button>

        <section class="partnership-section">
            <hr class="divider">
            <h2>제휴 및 협업 문의</h2>
            <p>궁금한 점이 있으시면 아래 폼을 통해 문의주세요.</p>
            <form action="https://formspree.io/f/xgonloow" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">이름 / 업체명</label>
                    <input type="text" id="name" name="name" required placeholder="예: 홍길동 / (주)행운">
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="문의하실 내용을 입력해주세요."></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
